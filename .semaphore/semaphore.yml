version: v1.0
name: repro exit 130
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
blocks:
  - name: exit-130
    task:
      jobs:
        - name: tool-exits-130
          commands:
            - echo "running a tool that will exit 130 (SIGINT convention)"
            - bash -c 'exit 130'
            - echo "this line should NOT run"
